name: build-pool

on:
  schedule:
    # 週日 17:00 UTC = 週一 01:00 Asia/Taipei
    - cron: "0 17 * * 0"
  workflow_dispatch:

# Pages 部署來源是 main / docs,直接 push games.json 就會 republish
concurrency:
  group: build-pool
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-build.txt

      - name: install build deps
        run: pip install -r scripts/requirements-build.txt

      - name: build games.json
        run: python scripts/build_pool.py

      - name: commit & push if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add docs/data/games.json docs/data/version.txt
          if git diff --cached --quiet; then
            echo "no changes — skip commit"
          else
            git commit -m "data: weekly pool rebuild $(date -u +%F)"
            git push
          fi
