name: build-pool

on:
  schedule:
    # 週日 17:00 UTC = 週一 01:00 Asia/Taipei
    - cron: "0 17 * * 0"
  workflow_dispatch:

# Pages 部署來源是 main / docs,直接 push games.json 就會 republish
concurrency:
  group: build-pool
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180   # 3 小時 buffer;實際 fresh build ~70-90 min, incremental ~10 min
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements-build.txt

      - name: install build deps
        run: pip install -r scripts/requirements-build.txt

      - name: build games.json
        run: python scripts/build_pool.py

      # build 期間 master 可能被人推新 commit → push 前重新 rebase 一次。
      # 失敗也保留 games.json 當 artifact,下次失敗才不會 0 收穫。
      - name: upload games.json as artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: games-json-${{ github.run_id }}
          path: |
            docs/data/games.json
            docs/data/version.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: commit & push if changed
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          git add docs/data/games.json docs/data/version.txt
          if git diff --cached --quiet; then
            echo "no changes — skip commit"
            exit 0
          fi
          git commit -m "data: weekly pool rebuild $(date -u +%F)"
          # 用 rebase + retry 處理「build 期間有人 push」的競態
          for attempt in 1 2 3; do
            git fetch origin master
            if git rebase origin/master; then
              if git push origin master; then
                echo "pushed on attempt $attempt"
                exit 0
              fi
            else
              echo "rebase conflict on attempt $attempt — abort & retry"
              git rebase --abort || true
            fi
            sleep $((attempt * 5))
          done
          echo "::error::failed to push after 3 attempts (race or conflict). games.json saved as artifact."
          exit 1
